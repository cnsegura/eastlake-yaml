apiVersion: apps/v1
kind: Deployment
metadata:
  name: eastlake
  labels:
    app: eastlake
spec:
  replicas: 3
  selector:
    matchLabels:
      app: eastlake
  template:
    metadata:
      labels:
        app: eastlake
    spec:
      containers:
      - name: eastlake
        image: eastlake:v1.0.0
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 250m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
